name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Executables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout rmmagent Repo
        uses: actions/checkout@v4
        with:
          repository: amidaware/rmmagent
          path: rmmagent
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
          cache-dependency-path: rmmagent/go.sum

      - name: Detect Latest Official Release
        id: upstream
        run: |
          set -e

          RESPONSE=$(curl -fsSL https://api.github.com/repos/amidaware/rmmagent/releases/latest)

          TAG_NAME=$(python3 -c 'import sys, json; print(json.load(sys.stdin)["tag_name"])' <<< "$RESPONSE")
          RELEASE_NAME=$(python3 -c 'import sys, json; print(json.load(sys.stdin)["name"])' <<< "$RESPONSE")

          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "null" ]; then
            echo "Unable to detect upstream tag_name"
            exit 1
          fi

          if [ -z "$RELEASE_NAME" ] || [ "$RELEASE_NAME" = "null" ]; then
            echo "Unable to detect upstream release name"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          echo "Upstream tag: $TAG_NAME"
          echo "Upstream release title: $RELEASE_NAME"

      - name: Check If Version Already Exists In This Repo
        id: existing
        run: |
          TAG_NAME="${{ steps.upstream.outputs.tag_name }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists in this repo: $TAG_NAME"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "New upstream version detected: $TAG_NAME"
          fi

      - name: Setup Environment
        run: |
          mkdir -p out
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64

      - name: Build Windows amd64
        working-directory: rmmagent
        run: |
          env GOOS=windows GOARCH=amd64 CGO_ENABLED=1 \
          CC=x86_64-w64-mingw32-gcc \
          CXX=x86_64-w64-mingw32-g++ \
          go build -ldflags "-s -w" -o ../out/rmmagent-windows-amd64.exe

      - name: Build Windows 386
        working-directory: rmmagent
        run: |
          env GOOS=windows GOARCH=386 CGO_ENABLED=1 \
          CC=i686-w64-mingw32-gcc \
          CXX=i686-w64-mingw32-g++ \
          go build -ldflags "-s -w" -o ../out/rmmagent-windows-386.exe

      - name: Build Linux amd64
        working-directory: rmmagent
        run: |
          env GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags "-s -w" -o ../out/rmmagent-linux-amd64

      - name: Build Mac amd64
        working-directory: rmmagent
        run: |
          env GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags "-s -w" -o ../out/rmmagent-mac-amd64

      - name: Build Mac arm64
        working-directory: rmmagent
        run: |
          env GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
          go build -ldflags "-s -w" -o ../out/rmmagent-mac-arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rmmagent-executables-${{ steps.upstream.outputs.tag_name }}
          path: out/*

      - name: Create Release For New Official Version
        if: steps.existing.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.tag_name }}
          name: ${{ steps.upstream.outputs.release_name }}
          files: out/*
          generate_release_notes: true
