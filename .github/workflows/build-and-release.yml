name: Build and Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Executables
    runs-on: ubuntu-latest

    steps:
      # Checkout this repository
      - name: Checkout Current Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Checkout rmmagent repo
      - name: Checkout rmmagent Repo
        uses: actions/checkout@v3
        with:
          repository: amidaware/rmmagent
          path: rmmagent

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache-dependency-path: rmmagent/go.sum

      - name: Create Version Output
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=latest" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Setup Environment
        run: |
          mkdir out
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64

      - name: Build Windows amd64
        working-directory: rmmagent
        run: env GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ go build -ldflags "-s -w" -o ../out/rmmagent-windows-amd64.exe

      - name: Build Windows x86
        working-directory: rmmagent
        run: env GOOS=windows GOARCH=386 CGO_ENABLED=1 CC=i686-w64-mingw32-gcc CXX=i686-w64-mingw32-g++ go build -ldflags "-s -w" -o ../out/rmmagent-windows-386.exe

      - name: Build Linux amd64
        working-directory: rmmagent
        run: env GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o ../out/rmmagent-linux-amd64

      - name: Build Mac amd64
        working-directory: rmmagent
        run: env GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o ../out/rmmagent-mac-amd64

      - name: Build Mac arm64
        working-directory: rmmagent
        run: env GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o ../out/rmmagent-mac-arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: rmmagent-executables
          path: out/*

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        uses: actions/checkout@v3

      # Set up Go
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21" # Adjust this to your required Go version

      - name: Clone Other Repository
        run: |
          git clone https://github.com/amidaware/rmmagent.git rmmagent
          cd rmmagent
          git checkout ${{ github.ref_name }}

      # Build Linux executables
      - name: Build Linux Executables
        run: |
          cd rmmagent
          ARCHS='amd64 386 arm64 arm'
          for arch in ${ARCHS}; do
            env CGO_ENABLED=0 GOOS=linux GOARCH=${arch} go build -ldflags "-s -w" -o ../rmmagent-linux-${arch}
          done

      # Build Windows executables
      - name: Build Windows Executables
        run: |
          cd rmmagent
          ARCHS='amd64 386'
          for arch in ${ARCHS}; do
            env CGO_ENABLED=0 GOOS=windows GOARCH=${arch} go build -ldflags "-s -w" -o ../rmmagent-win-${arch}.exe
          done

      # Build macOS executables
      - name: Build macOS Executables
        run: |
          cd rmmagent
          ARCHS='amd64 arm64'
          for arch in ${ARCHS}; do
            env CGO_ENABLED=0 GOOS=darwin GOARCH=${arch} go build -ldflags "-s -w" -o ../rmmagent-darwin-${arch}
          done

      # Create a GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      # Upload assets to the release
      - name: Upload Assets to Release with a wildcard
        uses: csexton/release-asset-action@v3
        with:
          pattern: "rmmagent-*"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          release-url: ${{ steps.create_release.outputs.upload_url }}
